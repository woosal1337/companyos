name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: companyos
          POSTGRES_PASSWORD: companyos
          POSTGRES_DB: companyos
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U companyos"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://companyos:companyos@localhost:5434/companyos
      COMPANYOS_KEK: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      JWT_SECRET_KEY: ci-secret-key-with-enough-length-for-hs256
      ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Create test database
        run: |
          docker exec ${{ job.services.postgres.id }} \
            psql -U companyos -d postgres -c "CREATE DATABASE companyos_test OWNER companyos"
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Typecheck
        run: uv run mypy src/
      - name: Migrate
        run: uv run alembic upgrade head
      - name: Test
        run: uv run pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bunx turbo run lint
      - name: Typecheck
        run: bunx turbo run typecheck
      - name: Build
        run: bunx turbo run build
      - name: Test marketing links
        run: bun test apps/web/src/components/marketing/site-links.test.ts
