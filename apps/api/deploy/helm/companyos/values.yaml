# CompanyOS Helm values (COS-205).
nameOverride: ""

api:
  image: ghcr.io/woosal1337/companyos-api:latest
  replicas: 2
  port: 8000
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: "1", memory: 1Gi }

web:
  image: ghcr.io/woosal1337/companyos-web:latest
  replicas: 2
  port: 3000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }

ingress:
  enabled: true
  className: nginx
  host: companyos.example.com
  tls: true

# Bundled Postgres for quick starts. Disable and set externalDatabaseUrl to use a
# managed database in production.
postgres:
  enabled: true
  image: postgres:17-alpine
  storage: 10Gi
externalDatabaseUrl: ""

# Required secrets — OVERRIDE every value before a production install.
secrets:
  COMPANYOS_KEK: "change-me-base64-32-bytes"
  JWT_SECRET_KEY: "change-me-in-production"
  CORS_ORIGINS: "https://companyos.example.com"
  RESEND_API_KEY: ""
  APP_BASE_URL: "https://companyos.example.com"
  OAUTH_ISSUER: "https://companyos.example.com"
