apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "companyos.name" . }}-web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels: { app: {{ include "companyos.name" . }}-web }
  template:
    metadata:
      labels: { app: {{ include "companyos.name" . }}-web }
    spec:
      containers:
        - name: web
          image: {{ .Values.web.image | quote }}
          ports: [{ containerPort: {{ .Values.web.port }} }]
          env:
            - name: BACKEND_ORIGIN
              value: "http://{{ include "companyos.name" . }}-api:{{ .Values.api.port }}"
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "companyos.name" . }}-web
spec:
  selector: { app: {{ include "companyos.name" . }}-web }
  ports: [{ port: {{ .Values.web.port }}, targetPort: {{ .Values.web.port }} }]
