apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "companyos.name" . }}-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels: { app: {{ include "companyos.name" . }}-api }
  template:
    metadata:
      labels: { app: {{ include "companyos.name" . }}-api }
    spec:
      initContainers:
        - name: migrate
          image: {{ .Values.api.image | quote }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef: { name: {{ include "companyos.name" . }}-secrets }
      containers:
        - name: api
          image: {{ .Values.api.image | quote }}
          ports: [{ containerPort: {{ .Values.api.port }} }]
          envFrom:
            - secretRef: { name: {{ include "companyos.name" . }}-secrets }
          livenessProbe:
            httpGet: { path: /api/v1/health, port: {{ .Values.api.port }} }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /api/v1/health, port: {{ .Values.api.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "companyos.name" . }}-api
spec:
  selector: { app: {{ include "companyos.name" . }}-api }
  ports: [{ port: {{ .Values.api.port }}, targetPort: {{ .Values.api.port }} }]
