{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "companyos.name" . }}-postgres
spec:
  serviceName: {{ include "companyos.name" . }}-postgres
  replicas: 1
  selector:
    matchLabels: { app: {{ include "companyos.name" . }}-postgres }
  template:
    metadata:
      labels: { app: {{ include "companyos.name" . }}-postgres }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_USER, value: companyos }
            - { name: POSTGRES_PASSWORD, value: companyos }
            - { name: POSTGRES_DB, value: companyos }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: {{ .Values.postgres.storage }} } }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "companyos.name" . }}-postgres
spec:
  selector: { app: {{ include "companyos.name" . }}-postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
{{- end }}
