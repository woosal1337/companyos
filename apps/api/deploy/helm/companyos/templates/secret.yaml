apiVersion: v1
kind: Secret
metadata:
  name: {{ include "companyos.name" . }}-secrets
type: Opaque
stringData:
  DATABASE_URL: {{ include "companyos.databaseUrl" . | quote }}
  COMPANYOS_KEK: {{ .Values.secrets.COMPANYOS_KEK | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.JWT_SECRET_KEY | quote }}
  CORS_ORIGINS: {{ .Values.secrets.CORS_ORIGINS | quote }}
  RESEND_API_KEY: {{ .Values.secrets.RESEND_API_KEY | quote }}
  APP_BASE_URL: {{ .Values.secrets.APP_BASE_URL | quote }}
  OAUTH_ISSUER: {{ .Values.secrets.OAUTH_ISSUER | quote }}
