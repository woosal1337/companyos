# CompanyOS — Docker Swarm stack (COS-205). `docker stack deploy -c docker-stack.yml companyos`
version: "3.8"
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: companyos
      POSTGRES_PASSWORD: companyos
      POSTGRES_DB: companyos
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    image: ghcr.io/woosal1337/companyos-api:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://companyos:companyos@postgres:5432/companyos
      COMPANYOS_KEK: ${COMPANYOS_KEK:?set a base64 32-byte key}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set a secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on: [postgres]
    deploy:
      replicas: 2
    ports:
      - "8000:8000"
  web:
    image: ghcr.io/woosal1337/companyos-web:latest
    environment:
      BACKEND_ORIGIN: http://api:8000
    depends_on: [api]
    deploy:
      replicas: 2
    ports:
      - "3000:3000"
volumes:
  pgdata:
