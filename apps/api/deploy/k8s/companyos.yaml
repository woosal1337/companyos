# CompanyOS — flat Kubernetes manifests (COS-205).
# Helm-less install: edit the Secret values + image refs, then `kubectl apply -f companyos.yaml`.
apiVersion: v1
kind: Secret
metadata:
  name: companyos-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://companyos:companyos@companyos-postgres:5432/companyos"
  COMPANYOS_KEK: "CHANGE-ME-base64-32-bytes"
  JWT_SECRET_KEY: "CHANGE-ME-in-production"
  CORS_ORIGINS: "https://companyos.example.com"
  RESEND_API_KEY: ""
  APP_BASE_URL: "https://companyos.example.com"
  OAUTH_ISSUER: "https://companyos.example.com"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: companyos-postgres
spec:
  serviceName: companyos-postgres
  replicas: 1
  selector:
    matchLabels:
      app: companyos-postgres
  template:
    metadata:
      labels:
        app: companyos-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: companyos
            - name: POSTGRES_PASSWORD
              value: companyos
            - name: POSTGRES_DB
              value: companyos
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: companyos-postgres
spec:
  selector:
    app: companyos-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: companyos-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: companyos-api
  template:
    metadata:
      labels:
        app: companyos-api
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/woosal1337/companyos-api:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: companyos-secrets
      containers:
        - name: api
          image: ghcr.io/woosal1337/companyos-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: companyos-secrets
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: companyos-api
spec:
  selector:
    app: companyos-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: companyos-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: companyos-web
  template:
    metadata:
      labels:
        app: companyos-web
    spec:
      containers:
        - name: web
          image: ghcr.io/woosal1337/companyos-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_ORIGIN
              value: "http://companyos-api:8000"
---
apiVersion: v1
kind: Service
metadata:
  name: companyos-web
spec:
  selector:
    app: companyos-web
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: companyos
spec:
  ingressClassName: nginx
  rules:
    - host: companyos.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: companyos-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: companyos-web
                port:
                  number: 3000
