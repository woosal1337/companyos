services:
  postgres:
    image: postgres:17-alpine
    container_name: companyos-postgres
    environment:
      POSTGRES_USER: companyos
      POSTGRES_PASSWORD: companyos
      POSTGRES_DB: companyos
    ports:
      - "5434:5432"
    volumes:
      - companyos_pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companyos -d companyos"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: companyos-api:local
    container_name: companyos-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://companyos:companyos@postgres:5432/companyos
      COMPANYOS_KEK: ${COMPANYOS_KEK:-6TTRiEDAMzSkS6g3YKCQCjbqx9mUnCO3Rsop01k0FSY=}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-jwt-secret-change-in-production}
      ENV: development
      CORS_ORIGINS: http://localhost:3000
    command: ["sh", "-c", "alembic upgrade head && uvicorn companyos.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  companyos_pgdata:
