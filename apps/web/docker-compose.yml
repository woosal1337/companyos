services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_ORIGIN: ${BACKEND_ORIGIN:-http://host.docker.internal:8001}
    image: companyos-web:local
    container_name: companyos-web
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
